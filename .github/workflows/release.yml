name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-release-${{ hashFiles('requirements/dev.txt', 'setup.py') }}
        restore-keys: |
          ${{ runner.os }}-pip-release-
          ${{ runner.os }}-pip-

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build wheel twine
        pip install -r requirements/dev.txt

    - name: Run tests before release
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)/src
        pytest tests/ -v --tb=short

    - name: Build distribution packages
      run: python -m build

    - name: Verify distribution packages
      run: twine check dist/*

    - name: Extract changelog for release notes
      id: changelog
      run: |
        TAG="${{ github.ref_name }}"
        # Try to extract the section for this tag from CHANGELOG.md
        if [ -f CHANGELOG.md ]; then
          NOTES=$(awk "/^## \[?${TAG#v}/,/^## /" CHANGELOG.md | head -n -1)
        else
          NOTES="Release ${TAG}"
        fi
        echo "NOTES<<EOF" >> "$GITHUB_OUTPUT"
        echo "$NOTES" >> "$GITHUB_OUTPUT"
        echo "EOF" >> "$GITHUB_OUTPUT"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: ${{ github.ref_name }}
        body: ${{ steps.changelog.outputs.NOTES }}
        files: dist/*
        draft: false
        prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
