name: isr
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  # Base Python
  - python=3.10
  
  # Core Scientific & Math
  - numpy>=1.21.0
  - scipy>=1.7.0
  - pyyaml>=5.4
  
  # Control Systems / DMPC Solvers
  - cvxpy>=1.2.0
  - osqp>=0.6.0
  
  # Deep Learning
  - pytorch>=1.9.0
  
  # Dev Tools & Visualization
  - pytest>=6.2.0
  - pytest-cov>=2.12.0
  - black>=21.5b0
  - flake8>=3.9.0
  - mypy>=0.910
  - jupyter>=1.0.0
  - matplotlib>=3.4.0
  - ipython>=7.0.0
  
  # Pip installations for Gym and the local package
  - pip
  - pip:
      - gym>=0.21.0
      - -e .[dev]
