# ISR-RL-DMPC Pre-Defined Mission Scenarios

area_surveillance:
  description: "Persistent coverage of a designated area with uniform sensor sweep"
  area_size: [500.0, 500.0] # m
  num_drones: 4
  num_targets: 0
  coverage_goal: 0.95
  max_duration: 1800.0 # s
  formation_type: "grid"
  revisit_interval: 60.0 # s
  priority_zones: []
  communication_range: 150.0 # m
  min_altitude: 20.0 # m
  max_altitude: 80.0 # m

threat_response:
  description: "Rapid detection and tracking of hostile targets entering the area"
  area_size: [300.0, 300.0] # m
  num_drones: 6
  num_targets: 3
  coverage_goal: 0.80
  max_duration: 600.0 # s
  formation_type: "wedge"
  threat_level: "high"
  response_time: 10.0 # s
  intercept_radius: 50.0 # m
  communication_range: 200.0 # m
  min_altitude: 15.0 # m
  max_altitude: 60.0 # m

search_and_track:
  description: "Locate and maintain continuous tracking of mobile targets"
  area_size: [800.0, 800.0] # m
  num_drones: 5
  num_targets: 4
  coverage_goal: 0.90
  max_duration: 1200.0 # s
  formation_type: "line"
  search_pattern: "expanding_square"
  track_handoff_range: 100.0 # m
  target_velocity_estimate: 5.0 # m/s
  communication_range: 180.0 # m
  min_altitude: 25.0 # m
  max_altitude: 100.0 # m
