# ISR-RL-DMPC Drone Physical Specifications
#
# Drone models used in the ISR-DMPC system:
#
#   reconnaissance — hector_quadrotor (TU Darmstadt open-source model)
#                    https://github.com/tu-darmstadt-ros-pkg/hector_quadrotor
#                    This is the reference model used for RViz2 visualisation
#                    and matches the URDF / mesh shipped in the package.
#
#   interceptor    — scaled-up ISR quad (Holybro X500 v2 class)
#                    Suitable for payload-carrying ISR with longer endurance.

reconnaissance:
  # Airframe — matches hector_quadrotor URDF (urdf/drone.urdf)
  mass: 1.477         # kg   (hector_quadrotor base_link mass)
  inertia: [0.01152, 0.01152, 0.02180]  # kg·m²  [Ixx, Iyy, Izz]
  arm_length: 0.215   # m    (rotor-to-CoM distance, X-quad)
  num_rotors: 4
  rotor_span: 0.550   # m    (tip-to-tip rotor diameter)

  # Motor specifications (NXT-motors 2214-920KV class)
  motor:
    max_thrust_per_motor: 9.5   # N    (4 motors → 38 N peak, ~2.6× hover)
    max_rpm: 11500
    torque_constant: 0.016      # N·m/A
    response_time: 0.025        # s    (≈ first-order motor lag)

  # Performance limits
  max_velocity: 15.0            # m/s
  max_acceleration: 8.0         # m/s²  (conservative for real hardware)
  max_angular_velocity: 2.0     # rad/s
  max_yaw_rate: 2.0             # rad/s
  max_climb_rate: 4.0           # m/s

  # Battery (4S 5000 mAh LiPo)
  battery:
    capacity: 5000.0            # mAh
    voltage: 14.8               # V  (4S nominal)
    max_discharge_rate: 30.0    # C
    hover_power: 64.0           # W  (≈ mass × g × v_ind ≈ 1.477×9.81×4.4)
    endurance: 22.0             # min (typical with 5000 mAh pack)

  # Aerodynamics
  aerodynamics:
    drag_coefficient: 0.22
    frontal_area: 0.025         # m²
    rotor_disk_area: 0.019      # m²  (π × (0.055)²)

  # DMPC controller tuning for this airframe
  dmpc:
    collision_radius: 3.0       # m   (safe separation: ~5× rotor span)
    accel_max: 8.0              # m/s²
    horizon: 20
    dt: 0.02                    # s   (50 Hz)

interceptor:
  # Airframe — Holybro X500 v2 class (5" prop, ~1.8 kg AUW)
  mass: 1.800         # kg
  inertia: [0.0320, 0.0320, 0.0580]  # kg·m²
  arm_length: 0.250   # m
  num_rotors: 4
  rotor_span: 0.500   # m

  # Motor specifications (T-Motor MN3508 580KV)
  motor:
    max_thrust_per_motor: 14.0  # N
    max_rpm: 8500
    torque_constant: 0.020      # N·m/A
    response_time: 0.018        # s

  # Performance limits
  max_velocity: 22.0            # m/s
  max_acceleration: 12.0        # m/s²
  max_angular_velocity: 3.0     # rad/s
  max_yaw_rate: 3.0             # rad/s
  max_climb_rate: 7.0           # m/s

  # Battery (6S 6000 mAh LiPo)
  battery:
    capacity: 6000.0            # mAh
    voltage: 22.2               # V  (6S nominal)
    max_discharge_rate: 35.0    # C
    hover_power: 155.0          # W
    endurance: 18.0             # min

  # Aerodynamics
  aerodynamics:
    drag_coefficient: 0.28
    frontal_area: 0.040         # m²
    rotor_disk_area: 0.030      # m²

  # DMPC controller tuning for this airframe
  dmpc:
    collision_radius: 4.0       # m
    accel_max: 12.0             # m/s²
    horizon: 20
    dt: 0.02                    # s   (50 Hz)
