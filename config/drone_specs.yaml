# ISR-RL-DMPC Drone Physical Specifications

reconnaissance:
  # Airframe
  mass: 1.2 # kg
  inertia: [0.04, 0.04, 0.08] # kg-m^2
  arm_length: 0.175 # m
  num_rotors: 4

  # Motor specifications
  motor:
    max_thrust_per_motor: 6.0 # N
    max_rpm: 12000
    torque_constant: 0.015 # N-m/A
    response_time: 0.02 # s

  # Performance limits
  max_velocity: 15.0 # m/s
  max_acceleration: 8.0 # m/s^2
  max_angular_velocity: 1.5 # rad/s
  max_yaw_rate: 1.5 # rad/s
  max_climb_rate: 3.0 # m/s

  # Battery
  battery:
    capacity: 6000.0 # mAh
    voltage: 14.8 # V
    max_discharge_rate: 25.0 # C
    hover_power: 85.0 # W
    endurance: 35.0 # min

  # Aerodynamics
  aerodynamics:
    drag_coefficient: 0.25
    frontal_area: 0.03 # m^2
    rotor_disk_area: 0.02 # m^2

interceptor:
  # Airframe
  mass: 2.5 # kg
  inertia: [0.08, 0.08, 0.15] # kg-m^2
  arm_length: 0.22 # m
  num_rotors: 4

  # Motor specifications
  motor:
    max_thrust_per_motor: 15.0 # N
    max_rpm: 18000
    torque_constant: 0.022 # N-m/A
    response_time: 0.01 # s

  # Performance limits
  max_velocity: 30.0 # m/s
  max_acceleration: 15.0 # m/s^2
  max_angular_velocity: 3.5 # rad/s
  max_yaw_rate: 3.5 # rad/s
  max_climb_rate: 8.0 # m/s

  # Battery
  battery:
    capacity: 8000.0 # mAh
    voltage: 22.2 # V
    max_discharge_rate: 40.0 # C
    hover_power: 180.0 # W
    endurance: 20.0 # min

  # Aerodynamics
  aerodynamics:
    drag_coefficient: 0.30
    frontal_area: 0.05 # m^2
    rotor_disk_area: 0.035 # m^2
